<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Champdex</title>
    <script>
      var pathSegmentsToKeep = 1
      var locationParts = window.location
      var newPath =
        locationParts.protocol +
        '//' +
        locationParts.hostname +
        (locationParts.port ? ':' + locationParts.port : '') +
        locationParts.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
        '/?/' +
        locationParts.pathname
          .slice(1)
          .split('/')
          .slice(pathSegmentsToKeep)
          .join('/')
          .replace(/&/g, '~and~') +
        (locationParts.search ? '&' + locationParts.search.slice(1).replace(/&/g, '~and~') : '') +
        locationParts.hash

      window.location.replace(newPath)
    </script>
  </head>
  <body></body>
</html>
