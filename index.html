<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Champdex is a Pokemon Champions companion app with a future-ready Pokedex, team planner, and damage calculator."
    />
    <title>Champdex</title>
    <script>
      ;(function (location) {
        if (location.search.startsWith('?/')) {
          const decoded = location.search
            .slice(2)
            .split('&')
            .map((segment) => segment.replace(/~and~/g, '&'))
            .join('?')

          window.history.replaceState(null, '', `${location.pathname}${decoded}${location.hash}`)
        }
      })(window.location)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
